<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="JSBA Badminton Academy - Premier badminton training management app">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- PWA meta tags -->
  <meta name="theme-color" content="#2E7D32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JSBA">
  <meta name="application-name" content="JSBA">
  <meta name="msapplication-TileColor" content="#2E7D32">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- iOS icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" type="image/png" href="favicon.png">

  <title>JSBA Badminton Academy</title>
  <link rel="manifest" href="manifest.json">

  <!-- PWA installation handling -->
  <script>
    // Track if user has dismissed install prompt
    let deferredPrompt;
    let hasDismissed = localStorage.getItem('pwa_install_dismissed') === 'true';

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent default browser prompt
      e.preventDefault();
      deferredPrompt = e;
      
      // Show custom install button if not dismissed
      if (!hasDismissed) {
        showInstallButton();
      }
    });

    // Handle successful install
    window.addEventListener('appinstalled', (e) => {
      // Clear deferred prompt
      deferredPrompt = null;
      // Hide install button
      hideInstallButton();
      // Clear dismissed state
      localStorage.removeItem('pwa_install_dismissed');
    });

    // Called from Flutter to trigger the native install prompt
    window.triggerPwaInstall = function() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt = null;
      }
    };

    function showInstallButton() {
      // Button will be added by Flutter app
      window.dispatchEvent(new CustomEvent('pwa-ready-to-show-install'));
    }

    function hideInstallButton() {
      window.dispatchEvent(new CustomEvent('pwa-hide-install'));
    }

    // Check if already installed
    if (window.matchMedia('(display-mode: standalone)').matches) {
      // App is running as installed PWA
      document.body.setAttribute('data-pwa-installed', 'true');
  </script>
  <style>
    /* Styling for the PWA Loading Screen matching Flutter/Native design */
    #loading_indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    #loading_indicator.fade-out {
      opacity: 0;
    }

    .splash-logo {
      width: 45%;
      max-width: 320px;
      height: auto;
      object-fit: contain;
    }

    .spinner {
      margin-top: 32px;
      width: 36px;
      height: 36px;
      border: 4px solid rgba(0, 0, 0, 0.08);
      border-left-color: rgba(0, 0, 0, 0.54); /* Colors.black54 */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Clean white splash loader matching native/Flutter splash screen -->
  <div id="loading_indicator">
    <img class="splash-logo" src="icons/splash_logo.png" alt="JSBA Logo" />
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
