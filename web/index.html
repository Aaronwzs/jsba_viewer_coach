<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="JSBA Badminton Academy - Premier badminton training management app">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- PWA meta tags -->
  <meta name="theme-color" content="#2E7D32">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JSBA">
  <meta name="application-name" content="JSBA">
  <meta name="msapplication-TileColor" content="#2E7D32">
  <meta name="msapplication-tap-highlight" content="no">

  <!-- iOS icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" type="image/png" href="favicon.png">

  <title>JSBA Badminton Academy</title>
  <link rel="manifest" href="manifest.json">

  <!-- PWA installation handling -->
  <script>
    // Track if user has dismissed install prompt
    let deferredPrompt;
    let hasDismissed = localStorage.getItem('pwa_install_dismissed') === 'true';

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent default browser prompt
      e.preventDefault();
      deferredPrompt = e;
      
      // Show custom install button if not dismissed
      if (!hasDismissed) {
        showInstallButton();
      }
    });

    // Handle successful install
    window.addEventListener('appinstalled', (e) => {
      // Clear deferred prompt
      deferredPrompt = null;
      // Hide install button
      hideInstallButton();
      // Clear dismissed state
      localStorage.removeItem('pwa_install_dismissed');
    });

    function showInstallButton() {
      // Button will be added by Flutter app
      window.dispatchEvent(new CustomEvent('pwa-ready-to-show-install'));
    }

    function hideInstallButton() {
      window.dispatchEvent(new CustomEvent('pwa-hide-install'));
    }

    // Check if already installed
    if (window.matchMedia('(display-mode: standalone)').matches) {
      // App is running as installed PWA
      document.body.setAttribute('data-pwa-installed', 'true');
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
